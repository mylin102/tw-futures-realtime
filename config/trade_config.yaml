# 🚀 Squeeze Taiwan Futures Auto-Trader Configuration

# 實戰總開關
live_trading: false

# 1. 策略核心參數
strategy:
  length: 20
  entry_score: 70
  use_squeeze: true
  use_pullback: true
  regime_filter: "mid"
  
  pullback:
    ema_fast: 20
    ema_slow: 60
    lookback: 60
    buffer: 1.002

  # 🚀 新增：分批停利策略 (Partial Exit)
  partial_exit:
    enabled: true      # 是否啟動分批停利
    tp1_pts: 40        # 第一階段停利點數 (40 點)
    tp1_lots: 1        # 第一階段平倉口數

  weights:
    "1h": 0.2
    "15m": 0.4
    "5m": 0.4

# 2. 部位管理
trade_mgmt:
  lots_per_trade: 2    # 進場直接 2 口
  max_positions: 2
  allow_long: true
  allow_short: true
  force_close_at_end: false

# 3. 風險控管
risk_mgmt:
  # --- 固定停損 ---
  stop_loss_pts: 30            # 固定停損點數（ATR 停用時使用）
  break_even_pts: 30           # 移動到保本停損的獲利點數
  exit_on_vwap: true           # 是否於價格跌破/突破 VWAP 時離場
  
  # --- ATR 動態停損 ---
  # 設定說明：
  #   atr_multiplier = 0     → 停用 ATR，使用上方固定停損 (stop_loss_pts)
  #   atr_multiplier > 0     → 啟用 ATR，停損點數 = ATR 值 × atr_multiplier
  #   建議測試範圍：0.1 ~ 0.15 (緊停損)，不建議 > 0.3 (停損過寬)
  atr_length: 14               # ATR 計算週期（K 棒數量）
  atr_multiplier: 0.0          # ATR 停損倍數：0=停用，>0=啟用（最佳測試值：0.1）
  
  # --- MA 動態停損 ---
  # 設定說明：
  #   ma_stop_multiplier = 0     → 停用 MA 停損
  #   ma_stop_multiplier > 0     → 啟用 MA 停損，停損價 = MA ± (ma_stop_ticks × ma_stop_multiplier)
  #   適用於趨勢市，建議搭配固定停損使用
  #   
  # 回測結果（2026-03-29）：
  #   - MA20-5tick: +215,575 TWD, 勝率 64.5%, MDD 9,422, PF 3.33 ✅ 最佳
  #   - MA20-10tick: +206,887 TWD, 勝率 64.8%, MDD 9,326, PF 3.27
  #   - 固定 30 點：+71,356 TWD, 勝率 44.0%, MDD 15,042, PF 1.62
  #   - MA60-5tick: +34,934 TWD, 勝率 44.6%, MDD 24,661, PF 1.23
  ma_stop_type: "below"        # "below"=MA 下方/上方固定 tick 數，"cross"=跌破/突破 MA
  ma_stop_length: 20           # 使用哪條 MA（20=最佳，60=較差）
  ma_stop_ticks: 5             # MA 下方/上方幾個 tick（1 tick = 1 點，僅 type=below 時使用）
  ma_stop_multiplier: 1.0      # MA 停損倍數：0=停用，>0=啟用（1.0=最佳）

# 4. 回測執行與交易成本模型
execution:
  order_type: "market"        # market | limit | range_market
  tick_size: 1.0
  market_slippage_pts: 1.0
  limit_offset_pts: 2.0
  range_protection_pts: 3.0
  broker_fee_per_side: 20.0   # 依券商實際手續費調整
  exchange_fee_per_side: 0.0  # 若已含在券商手續費，可維持 0
  tax_rate: 0.00002           # 台灣股價指數期貨稅率，TMF 使用此假設
  initial_balance: 100000     # 初始帳戶餘額

# 5. 實時監控與輪詢設定
monitoring:
  # 數據模式選擇：
  #   - "polling": 傳統輪詢模式（每 poll_interval_secs 秒查詢一次）
  #   - "callback": 使用 shioaji callback 接收即時數據（推薦，但需要 shioaji 支援）
  data_mode: "polling"
  
  poll_interval_secs: 30      # 輪詢間隔（秒）- 僅 data_mode=polling 時使用
  pb_confirmation_bars: 12    # 高點/低點確認週期（K 棒數量）
  
  # Callback 模式設定
  callback:
    use_tick_data: false      # 是否使用 tick 數據（true=即時 tick, false=K 棒更新）
    buffer_size: 100          # K 棒緩衝大小
