# 🚀 Squeeze Taiwan Futures Auto-Trader Configuration

# 實戰總開關
live_trading: false

# 1. 策略核心參數
strategy:
  length: 20
  entry_score: 70
  use_squeeze: true
  use_pullback: true
  regime_filter: "mid"
  
  pullback:
    ema_fast: 20
    ema_slow: 60
    lookback: 60
    buffer: 1.002

  # 🚀 新增：分批停利策略 (Partial Exit)
  partial_exit:
    enabled: true      # 是否啟動分批停利
    tp1_pts: 40        # 第一階段停利點數 (40 點)
    tp1_lots: 1        # 第一階段平倉口數

  weights:
    "1h": 0.2
    "15m": 0.4
    "5m": 0.4

# 2. 部位管理
trade_mgmt:
  lots_per_trade: 2    # 進場直接 2 口
  max_positions: 2
  allow_long: true
  allow_short: true
  force_close_at_end: false

# 3. 風險控管
risk_mgmt:
  stop_loss_pts: 30
  break_even_pts: 30
  exit_on_vwap: true
